server:
  port: 8080

spring:
  datasource:
    platform: postgres
    username: postgres
    password: 1234
    url: jdbc:postgresql://localhost:5432/battery
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format-sql: true
  cloud:
    gateway:
      routes:
        filters:
          - JwtValidationFilter
